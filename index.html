<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind+daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<!-- fontWasme -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
     <div class="min-h-screen flex items-center justify-center bg-base-200">
  <div class="card w-96 bg-base-100 shadow-xl p-6 space-y-2">

   
    <div class="flex justify-center mb-4">
      <img src="assets/github-logo.png" class="w-16 h-16" />
    </div>

    <h2 class="text-2xl font-bold text-center">GitHub Tracker</h2>
    <p class="text-center text-sm opacity-70 mb-4 text-[#64748bFF]">
      Sign in to manage your issues
    </p>

   
    <label class="label">
      <p class="label-text">Username</p>
    </label>
    <input id="ussrname" type="text" placeholder="Enter Username" class="input input-bordered w-full" />
    <p class="text-[#4a00ff]">Default: admin</p>

    
    <label class="label mt-2">
      <p class="label-text">Password</p>
    </label>
    <input id="pass" type="password" placeholder="Enter Password" class="input input-bordered w-full" />
    <p class="text-[#4a00ff]">Default: admin123</p>

   
    <button id="loging" class="btn btn-primary w-full mt-4">Sign In</button>
     <div class="divider mt-2">OR</div>

     
      <p class="text-center text-[#64748bFF]">Demo Credentials:</p>

      <div class="bg-base-200 text-center p-4">
        <p class="font-semibold">Username: <span class="text-[#64748bFF]">admin</span></p>
        <p class="font-semibold">Password: <span class="text-[#64748bFF]">admin123</span></p>
      </div>
     

  </div>
</div>



<script src="js/script.js"></script>
  
    
</body>
</html>
